<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | Fashion Hub – The Digital Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif:ital,wght@0,500;0,600;1,500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#00342b", "on-primary": "#ffffff", "surface": "#f9f9f7",
        "surface-container-low": "#f4f4f2", "surface-container": "#eeeeec",
        "surface-container-lowest": "#ffffff", "secondary": "#5f5e5e",
        "outline-variant": "#bfc9c4", "on-surface": "#1a1c1b",
        "on-surface-variant": "#3f4945", "error": "#ba1a1a"
      },
      fontFamily: { "headline": ["Noto Serif"], "body": ["Inter"], "label": ["Inter"] },
      borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-serif { font-family: 'Noto Serif', serif; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #f4f4f2 inset !important; }
</style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen grid md:grid-cols-2">

<!-- Left Panel - Visual -->
<div class="hidden md:flex flex-col justify-between bg-primary text-on-primary p-16 relative overflow-hidden">
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-0 right-0 w-96 h-96 bg-white rounded-full -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-white rounded-full translate-y-1/2 -translate-x-1/2"></div>
  </div>
  <div class="relative z-10">
    <a href="/" class="text-2xl font-serif tracking-tight text-white">Fashion Hub</a>
  </div>
  <div class="relative z-10 space-y-6">
    <blockquote class="text-4xl font-serif italic leading-snug">"Style is the perfection of a point of view."</blockquote>
    <p class="text-sm opacity-70 tracking-widest uppercase">— Richard Avedon</p>
  </div>
  <div class="relative z-10 text-xs opacity-50 tracking-widest uppercase">© <span id="copyright-year-side">2026</span> Digital Atelier</div>
</div>

<!-- Right Panel - Form -->
<div class="flex flex-col justify-center px-8 md:px-16 lg:px-24 py-16">
  <div class="max-w-sm w-full mx-auto space-y-10">

    <!-- Mobile brand -->
    <a href="/" class="md:hidden text-xl font-serif tracking-tight text-primary block">Fashion Hub</a>

    <!-- Toggle Tabs -->
    <div class="flex border-b border-outline-variant">
      <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-4 text-xs tracking-widest uppercase font-bold text-primary border-b-2 border-primary transition-all">Sign In</button>
      <button id="tab-register" onclick="switchTab('register')" class="flex-1 pb-4 text-xs tracking-widest uppercase font-label text-secondary border-b-2 border-transparent transition-all">Create Account</button>
    </div>

    <!-- Error / Success Banner -->
    <div id="auth-message" class="hidden text-sm p-4 border text-center"></div>

    <!-- Login Form -->
    <form id="login-form" class="space-y-6" onsubmit="handleLogin(event)">
      <div class="space-y-2">
        <label class="text-xs tracking-widest uppercase font-label" for="login-email">Email Address</label>
        <input id="login-email" type="email" required autocomplete="email"
          class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-3 px-0 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="you@example.com">
      </div>
      <div class="space-y-2">
        <label class="text-xs tracking-widest uppercase font-label" for="login-password">Password</label>
        <div class="relative">
          <input id="login-password" type="password" required autocomplete="current-password"
            class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-3 px-0 pr-10 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="••••••••">
          <button type="button" onclick="togglePass('login-password', this)" class="absolute right-0 top-3 text-secondary">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>
      <button type="submit" id="login-btn"
        class="w-full bg-primary text-on-primary py-4 text-xs tracking-widest uppercase font-label hover:opacity-90 transition-all flex items-center justify-center gap-2">
        <span id="login-btn-text">Enter The Atelier</span>
        <span id="login-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
      </button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="space-y-6 hidden" onsubmit="handleRegister(event)">
      <div class="space-y-2">
        <label class="text-xs tracking-widest uppercase font-label" for="reg-name">Full Name</label>
        <input id="reg-name" type="text" required
          class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-3 px-0 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="Your Name">
      </div>
      <div class="space-y-2">
        <label class="text-xs tracking-widest uppercase font-label" for="reg-email">Email Address</label>
        <input id="reg-email" type="email" required autocomplete="email"
          class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-3 px-0 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="you@example.com">
      </div>
      <div class="space-y-2">
        <label class="text-xs tracking-widest uppercase font-label" for="reg-password">Password</label>
        <div class="relative">
          <input id="reg-password" type="password" required minlength="6"
            class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-3 px-0 pr-10 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="Min. 6 characters">
          <button type="button" onclick="togglePass('reg-password', this)" class="absolute right-0 top-3 text-secondary">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>
      <button type="submit" id="reg-btn"
        class="w-full bg-primary text-on-primary py-4 text-xs tracking-widest uppercase font-label hover:opacity-90 transition-all flex items-center justify-center gap-2">
        <span id="reg-btn-text">Join The Atelier</span>
        <span id="reg-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
      </button>
    </form>

    <p class="text-xs text-secondary text-center">By continuing, you agree to our <a href="#" class="text-primary underline">Terms of Service</a> and <a href="#" class="text-primary underline">Privacy Policy</a>.</p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = '/account';

  document.getElementById('copyright-year-side').textContent = Math.max(new Date().getFullYear(), 2026);

  const params = new URLSearchParams(window.location.search);
  if (params.get('tab') === 'register') switchTab('register');

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-form').classList.toggle('hidden', !isLogin);
    document.getElementById('register-form').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').className = isLogin
      ? 'flex-1 pb-4 text-xs tracking-widest uppercase font-bold text-primary border-b-2 border-primary transition-all'
      : 'flex-1 pb-4 text-xs tracking-widest uppercase font-label text-secondary border-b-2 border-transparent transition-all';
    document.getElementById('tab-register').className = !isLogin
      ? 'flex-1 pb-4 text-xs tracking-widest uppercase font-bold text-primary border-b-2 border-primary transition-all'
      : 'flex-1 pb-4 text-xs tracking-widest uppercase font-label text-secondary border-b-2 border-transparent transition-all';
    hideMessage();
  }

  function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('.material-symbols-outlined');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
    else { input.type = 'password'; icon.textContent = 'visibility'; }
  }

  function showMessage(msg, type = 'error') {
    const el = document.getElementById('auth-message');
    el.textContent = msg;
    el.className = type === 'error'
      ? 'text-sm p-4 border border-red-300 bg-red-50 text-red-700 text-center'
      : 'text-sm p-4 border border-green-300 bg-green-50 text-green-700 text-center';
    el.classList.remove('hidden');
  }
  function hideMessage() { document.getElementById('auth-message').classList.add('hidden'); }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('login-spinner');
    document.getElementById('login-btn-text').textContent = 'Signing In...';
    spinner.classList.remove('hidden');
    btn.disabled = true;
    hideMessage();
    try {
      const data = await apiFetch('/api/users/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      Auth.setSession(data);
      const redirect = params.get('redirect') || '/account';
      window.location.href = redirect;
    } catch (err) {
      showMessage(err.message || 'Invalid credentials. Please try again.');
    } finally {
      spinner.classList.add('hidden');
      document.getElementById('login-btn-text').textContent = 'Enter The Atelier';
      btn.disabled = false;
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const spinner = document.getElementById('reg-spinner');
    document.getElementById('reg-btn-text').textContent = 'Creating Account...';
    spinner.classList.remove('hidden');
    btn.disabled = true;
    hideMessage();
    try {
      const data = await apiFetch('/api/users', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value
        })
      });
      Auth.setSession(data);
      window.location.href = '/account';
    } catch (err) {
      showMessage(err.message || 'Registration failed. Please try again.');
    } finally {
      spinner.classList.add('hidden');
      document.getElementById('reg-btn-text').textContent = 'Join The Atelier';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
